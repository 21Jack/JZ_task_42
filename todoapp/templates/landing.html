{% extends "base.html" %}

{% block title %}欢迎使用{% endblock %}

{% block content %}
<!-- Hero Section -->
<div class="px-4 py-5 my-5 text-center">
    <i class="bi bi-check2-square text-primary" style="font-size: 4rem;"></i>
    <h1 class="display-4 fw-bold">TodoList</h1>
    <div class="col-lg-6 mx-auto">
        <p class="lead mb-4">
            简单、高效的个人任务管理工具。<br>
            帮助您更好地组织日常任务，提高工作效率。
        </p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg px-4 gap-3">
                <i class="bi bi-person-plus"></i> 立即注册
            </a>
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-lg px-4">
                <i class="bi bi-box-arrow-in-right"></i> 登录
            </a>
        </div>
    </div>
</div>

<!-- Features Section -->
<div class="container px-4 py-5">
    <h2 class="pb-2 border-bottom text-center mb-5">功能特点</h2>
    <div class="row g-4 py-5 row-cols-1 row-cols-lg-3">
        <div class="col">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center p-4">
                    <div class="feature-icon bg-primary bg-gradient text-white rounded-circle mb-3 
                                d-inline-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-list-check fs-4"></i>
                    </div>
                    <h3 class="fs-4">任务管理</h3>
                    <p class="text-muted">轻松创建、编辑和管理您的任务，支持设置截止日期和优先级。</p>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center p-4">
                    <div class="feature-icon bg-success bg-gradient text-white rounded-circle mb-3 
                                d-inline-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-graph-up fs-4"></i>
                    </div>
                    <h3 class="fs-4">进度跟踪</h3>
                    <p class="text-muted">实时查看任务完成情况，直观了解工作进度。</p>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body text-center p-4">
                    <div class="feature-icon bg-info bg-gradient text-white rounded-circle mb-3 
                                d-inline-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-check fs-4"></i>
                    </div>
                    <h3 class="fs-4">安全可靠</h3>
                    <p class="text-muted">采用安全的密码加密技术，保护您的数据安全。</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CTA Section -->
<div class="bg-light p-5 rounded-lg m-3 text-center">
    <h2 class="mb-4">准备好开始了吗？</h2>
    <p class="lead mb-4">立即注册，开始高效管理您的任务。</p>
    <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg">
        <i class="bi bi-rocket"></i> 免费注册
    </a>
</div>
{% endblock %}
