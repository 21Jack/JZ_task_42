{% extends "base.html" %}

{% block title %}欢迎使用TodoList{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row align-items-center">
        <div class="col-md-6">
            <h1 class="display-4 fw-bold">TodoList</h1>
            <p class="lead mt-4">
                一个简单、高效的任务管理工具，帮助您组织和跟踪日常工作、学习和生活中的各种任务。
            </p>
            <div class="mt-5">
                <h3>主要功能</h3>
                <ul class="list-group list-group-flush mt-3">
                    <li class="list-group-item d-flex align-items-center">
                        <i class="bi bi-check-circle text-success me-3"></i>
                        <span>创建、编辑和删除任务</span>
                    </li>
                    <li class="list-group-item d-flex align-items-center">
                        <i class="bi bi-clock text-primary me-3"></i>
                        <span>设置任务截止日期</span>
                    </li>
                    <li class="list-group-item d-flex align-items-center">
                        <i class="bi bi-flag text-warning me-3"></i>
                        <span>跟踪任务状态（待办、进行中、已完成）</span>
                    </li>
                    <li class="list-group-item d-flex align-items-center">
                        <i class="bi bi-stats text-info me-3"></i>
                        <span>查看任务统计信息</span>
                    </li>
                    <li class="list-group-item d-flex align-items-center">
                        <i class="bi bi-lock text-secondary me-3"></i>
                        <span>安全的用户认证系统</span>
                    </li>
                </ul>
            </div>
            <div class="mt-5">
                <a href="{{ url_for('register') }}" class="btn btn-primary btn-lg me-3">立即注册</a>
                <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-lg">已有账号？登录</a>
            </div>
        </div>
        <div class="col-md-6 mt-5 mt-md-0">
            <!-- 这里可以添加一个图片或图表 -->
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">开始管理您的任务</h3>
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=modern%20task%20management%20dashboard%20with%20tasks%2C%20calendar%2C%20and%20statistics&image_size=landscape_16_9" alt="任务管理界面" class="img-fluid rounded">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
