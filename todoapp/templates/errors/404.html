{% extends "base.html" %}

{% block title %}页面未找到{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="py-5">
            <i class="bi bi-question-circle text-muted" style="font-size: 6rem;"></i>
            <h1 class="display-1 fw-bold text-muted">404</h1>
            <h2 class="mb-4">页面未找到</h2>
            <p class="lead text-muted mb-4">
                抱歉，您访问的页面不存在或已被移除。
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="{{ url_for('main.home') }}" class="btn btn-primary btn-lg px-4">
                    <i class="bi bi-house"></i> 返回首页
                </a>
                {% if not current_user.is_authenticated %}
                <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-lg px-4">
                    <i class="bi bi-box-arrow-in-right"></i> 登录
                </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
