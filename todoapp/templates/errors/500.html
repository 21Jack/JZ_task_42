{% extends "base.html" %}

{% block title %}服务器错误{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="py-5">
            <i class="bi bi-exclamation-triangle text-warning" style="font-size: 6rem;"></i>
            <h1 class="display-1 fw-bold text-muted">500</h1>
            <h2 class="mb-4">服务器内部错误</h2>
            <p class="lead text-muted mb-4">
                抱歉，服务器遇到了问题。请稍后再试。
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="{{ url_for('main.home') }}" class="btn btn-primary btn-lg px-4">
                    <i class="bi bi-house"></i> 返回首页
                </a>
                <button onclick="location.reload()" class="btn btn-outline-secondary btn-lg px-4">
                    <i class="bi bi-arrow-clockwise"></i> 刷新页面
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
